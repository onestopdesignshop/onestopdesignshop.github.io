<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Stop Design Shop — Premium Design Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0D0D0D;
      --paper:    #F7F6F2;
      --mid:      #8A8680;
      --rule:     #E2E0DA;
      --accent:   #5C3BFE;
      --accent2:  #FF5C3B;
      --card:     #FFFFFF;
      --fs-display: clamp(2.8rem, 7vw, 6rem);
      --fs-h2:    clamp(1.6rem, 3vw, 2.4rem);
      --fs-h3:    1.1rem;
      --fs-body:  0.95rem;
      --fs-label: 0.72rem;
      --radius:   12px;
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: var(--fs-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,246,242,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--rule);
      padding: 0 5vw;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.85rem; font-weight: 500;
      color: var(--mid); text-decoration: none;
      transition: color var(--transition);
    }
    .nav-links a:hover { color: var(--ink); }
    .nav-cta {
      background: var(--ink); color: var(--paper);
      border: none; border-radius: 999px;
      padding: 0.5rem 1.2rem;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: background var(--transition), transform var(--transition);
    }
    .nav-cta:hover { background: var(--accent); transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      min-height: 88vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 0 5vw;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -20%; right: -10%;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(92,59,254,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-left { position: relative; z-index: 2; padding: 4rem 0; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--accent); color: white;
      font-size: var(--fs-label); font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.3rem 0.8rem; border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    .hero-eyebrow::before { content: '◆'; font-size: 0.5rem; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: var(--fs-display);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }
    h1 em {
      font-style: normal;
      color: var(--accent);
      position: relative;
      display: inline-block;
    }
    h1 em::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 0; right: 0; height: 4px;
      background: var(--accent2);
      border-radius: 2px;
      opacity: 0.6;
    }
    .hero-sub {
      font-size: 1.05rem; color: var(--mid);
      max-width: 440px; line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary {
      background: var(--accent); color: white;
      border: none; border-radius: 999px;
      padding: 0.85rem 2rem;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 20px rgba(92,59,254,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(92,59,254,0.4); }
    .btn-ghost {
      background: transparent; color: var(--ink);
      border: 1.5px solid var(--rule); border-radius: 999px;
      padding: 0.85rem 2rem;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: border-color var(--transition), background var(--transition);
    }
    .btn-ghost:hover { border-color: var(--ink); background: rgba(13,13,13,0.04); }

    /* HERO stats strip */
    .hero-stats {
      display: flex; gap: 2.5rem; margin-top: 3rem;
      padding-top: 2rem; border-top: 1px solid var(--rule);
    }
    .stat-num {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
      color: var(--ink); line-height: 1;
    }
    .stat-label { font-size: 0.78rem; color: var(--mid); margin-top: 0.2rem; }

    /* HERO right — asset preview mosaic */
    .hero-right {
      position: relative; z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, 140px);
      gap: 12px;
      padding: 4rem 0 4rem 3rem;
    }
    .preview-tile {
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: default;
    }
    .preview-tile:hover { transform: scale(1.03); box-shadow: 0 12px 32px rgba(0,0,0,0.12); }
    .pt1 { background: #1A1A2E; grid-row: span 2; grid-column: 1; font-size: 4rem; }
    .pt2 { background: linear-gradient(135deg,#667eea,#764ba2); }
    .pt3 { background: #F7C59F; color: #5C3BFE; }
    .pt4 { background: #0D0D0D; grid-column: span 2; display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem; }
    .pt4-inner { display: flex; gap: 10px; align-items: center; }
    .pt4-dot { width: 38px; height: 38px; border-radius: 50%; }
    .icon-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .icon-cell { width: 34px; height: 34px; background: rgba(255,255,255,0.12); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }

    /* ── MARQUEE ── */
    .marquee-strip {
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      background: var(--ink);
      color: var(--paper);
      padding: 0.8rem 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee-track {
      display: inline-flex; gap: 3rem;
      animation: marquee 22s linear infinite;
    }
    .marquee-item {
      font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.7;
    }
    .marquee-sep { color: var(--accent); opacity: 1 !important; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── SECTIONS ── */
    section { padding: 5rem 5vw; }
    .section-label {
      font-size: var(--fs-label); font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.6rem;
    }
    h2 {
      font-family: 'Syne', sans-serif;
      font-size: var(--fs-h2);
      font-weight: 700; letter-spacing: -0.02em;
      color: var(--ink); margin-bottom: 0.6rem;
    }
    .section-sub { color: var(--mid); max-width: 520px; margin-bottom: 3rem; }

    /* ── PRODUCT GRID ── */
    #products { border-top: 1px solid var(--rule); }
    .filter-bar {
      display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 2.5rem;
    }
    .filter-btn {
      background: transparent; color: var(--mid);
      border: 1.5px solid var(--rule); border-radius: 999px;
      padding: 0.4rem 1rem;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--ink); color: var(--paper); border-color: var(--ink);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .product-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 16px;
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.10);
    }
    .product-card[data-category]:not([data-category="all"]).hidden {
      display: none;
    }
    .card-thumb {
      height: 200px;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      position: relative;
      overflow: hidden;
    }
    .card-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--accent2); color: white;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 999px;
    }
    .card-body { padding: 1.25rem 1.4rem 1.4rem; }
    .card-cat {
      font-size: var(--fs-label); font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--mid);
      margin-bottom: 0.35rem;
    }
    .card-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1.05rem; color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .card-desc { font-size: 0.83rem; color: var(--mid); margin-bottom: 1.2rem; line-height: 1.5; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-price {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      color: var(--ink);
    }
    .card-price s { font-size: 0.8rem; color: var(--mid); font-weight: 400; margin-right: 0.3rem; }
    .card-buy {
      background: var(--ink); color: var(--paper);
      border: none; border-radius: 999px;
      padding: 0.5rem 1.1rem;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: background var(--transition), transform var(--transition);
      display: inline-block;
    }
    .card-buy:hover { background: var(--accent); transform: scale(1.04); }

    /* ── HOW IT WORKS ── */
    #how { background: var(--ink); color: var(--paper); }
    #how h2 { color: var(--paper); }
    #how .section-label { color: var(--accent2); }
    #how .section-sub { color: rgba(247,246,242,0.55); }
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem; margin-top: 1rem;
    }
    .step {
      padding: 2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
    }
    .step-icon { font-size: 2rem; margin-bottom: 1rem; }
    .step-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1rem; color: var(--paper); margin-bottom: 0.5rem;
    }
    .step-body { font-size: 0.85rem; color: rgba(247,246,242,0.5); line-height: 1.6; }

    /* ── TESTIMONIALS ── */
    #testimonials { border-top: 1px solid var(--rule); }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .testimonial {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 1.8rem;
    }
    .t-stars { color: #F59E0B; font-size: 0.9rem; margin-bottom: 0.8rem; }
    .t-quote { font-size: 0.9rem; color: var(--ink); line-height: 1.65; margin-bottom: 1.2rem; font-style: italic; }
    .t-author { display: flex; align-items: center; gap: 0.75rem; }
    .t-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .t-name { font-weight: 600; font-size: 0.85rem; color: var(--ink); }
    .t-role { font-size: 0.75rem; color: var(--mid); }

    /* ── FAQ ── */
    #faq { border-top: 1px solid var(--rule); }
    .faq-list { max-width: 680px; }
    .faq-item {
      border-bottom: 1px solid var(--rule);
      padding: 1.3rem 0;
    }
    .faq-q {
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; gap: 1rem;
      font-weight: 500; font-size: 0.95rem; color: var(--ink);
      list-style: none;
    }
    .faq-q::after {
      content: '+';
      font-size: 1.3rem; color: var(--mid); flex-shrink: 0;
      transition: transform var(--transition);
    }
    .faq-item.open .faq-q::after { transform: rotate(45deg); }
    .faq-a {
      font-size: 0.88rem; color: var(--mid); line-height: 1.7;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .faq-item.open .faq-a { max-height: 200px; padding-top: 0.75rem; }

    /* ── FOOTER ── */
    footer {
      background: var(--ink); color: rgba(247,246,242,0.5);
      padding: 3rem 5vw;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer-inner {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1.5rem;
    }
    .footer-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
      color: var(--paper);
    }
    .footer-logo span { color: var(--accent); }
    .footer-links { display: flex; gap: 1.8rem; }
    .footer-links a { color: rgba(247,246,242,0.45); text-decoration: none; font-size: 0.82rem; transition: color var(--transition); }
    .footer-links a:hover { color: var(--paper); }
    .footer-copy { font-size: 0.78rem; text-align: center; margin-top: 2rem; opacity: 0.4; }

    /* ── SETUP BANNER ── */
